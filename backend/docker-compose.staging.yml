version: '3.8'

services:
  # Staging Database
  postgres-staging:
    image: postgres:15-alpine
    container_name: cravex-postgres-staging
    environment:
      POSTGRES_USER: staginguser
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD}
      POSTGRES_DB: cravex_staging
    ports:
      - "5432:5432"
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    networks:
      - cravex-staging-network

  # Staging Redis
  redis-staging:
    image: redis:7-alpine
    container_name: cravex-redis-staging
    ports:
      - "6379:6379"
    volumes:
      - redis-staging-data:/data
    networks:
      - cravex-staging-network

  # Staging Kafka
  zookeeper-staging:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cravex-zookeeper-staging
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cravex-staging-network

  kafka-staging:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cravex-kafka-staging
    depends_on:
      - zookeeper-staging
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-staging:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-staging:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - cravex-staging-network

  # API Service (Staging)
  api-staging:
    image: ${DOCKER_USERNAME}/cravex-backend:staging
    container_name: cravex-api-staging
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgres://staginguser:${STAGING_DB_PASSWORD}@postgres-staging:5432/cravex_staging?sslmode=require
      REDIS_URL: redis://redis-staging:6379
      KAFKA_BROKERS: kafka-staging:29092
      JWT_SECRET: ${STAGING_JWT_SECRET}
      STRIPE_API_KEY: ${STAGING_STRIPE_API_KEY}
      RAZORPAY_API_KEY: ${STAGING_RAZORPAY_API_KEY}
      DEBUG: "false"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      - postgres-staging
      - redis-staging
      - kafka-staging
    networks:
      - cravex-staging-network
    restart: unless-stopped

volumes:
  postgres-staging-data:
  redis-staging-data:

networks:
  cravex-staging-network:
    driver: bridge

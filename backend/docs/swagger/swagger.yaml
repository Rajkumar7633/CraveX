openapi: 3.0.0
info:
  title: CraveX API
  description: Comprehensive food delivery platform API with microservices architecture
  version: 1.0.0
  contact:
    name: CraveX API Support
    email: support@cravex.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8001
    description: Auth Service
  - url: http://localhost:8002
    description: Restaurant Service
  - url: http://localhost:8003
    description: Order Service
  - url: http://localhost:8004
    description: Rider Service
  - url: http://localhost:8005
    description: Payment Service
  - url: http://localhost:8006
    description: Notification Service

tags:
  - name: Auth
    description: Authentication and authorization endpoints
  - name: Restaurants
    description: Restaurant management endpoints
  - name: Orders
    description: Order management endpoints
  - name: Riders
    description: Rider management endpoints
  - name: Payments
    description: Payment processing endpoints
  - name: Notifications
    description: Notification management endpoints

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Create a new user account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Auth
      summary: User login
      description: Authenticate user and return JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Get new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /restaurants:
    get:
      tags:
        - Restaurants
      summary: Search restaurants
      description: Search for restaurants with filters and pagination
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: cuisine_type
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [rating, distance, delivery_time, popularity]
        - name: latitude
          in: query
          schema:
            type: number
        - name: longitude
          in: query
          schema:
            type: number
        - name: radius_km
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Restaurants retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRestaurants'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Restaurants
      summary: Create restaurant
      description: Create a new restaurant (requires authentication)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantCreate'
      responses:
        '201':
          description: Restaurant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /restaurants/{id}:
    get:
      tags:
        - Restaurants
      summary: Get restaurant by ID
      description: Retrieve detailed information about a specific restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Restaurant retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Restaurants
      summary: Update restaurant
      description: Update restaurant information (requires authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantUpdate'
      responses:
        '200':
          description: Restaurant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders:
    post:
      tags:
        - Orders
      summary: Create order
      description: Create a new food delivery order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid order data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Orders
      summary: Get user orders
      description: Retrieve orders for the authenticated user
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, ready, picked_up, on_the_way, delivered, cancelled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieve detailed information about a specific order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags:
        - Orders
      summary: Update order status
      description: Update order status (for restaurant/rider/admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdate'
      responses:
        '200':
          description: Order status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders/{id}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel order
      description: Cancel an order (user can cancel within time limits)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Order cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /riders/location:
    put:
      tags:
        - Riders
      summary: Update rider location
      description: Update rider's current location (for rider app)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiderLocationUpdate'
      responses:
        '200':
          description: Location updated successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /riders/nearby:
    get:
      tags:
        - Riders
      summary: Get nearby riders
      description: Find available riders near a location
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
        - name: longitude
          in: query
          required: true
          schema:
            type: number
        - name: radius_km
          in: query
          schema:
            type: number
            default: 5.0
        - name: vehicle_type
          in: query
          schema:
            type: string
            enum: [bike, scooter, bicycle, walk]
      responses:
        '200':
          description: Nearby riders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Rider'

  /riders/{id}/status:
    patch:
      tags:
        - Riders
      summary: Update rider status
      description: Update rider availability status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [offline, available, busy, on_delivery, break]
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rider'
        '400':
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /riders/{id}/earnings:
    get:
      tags:
        - Riders
      summary: Get rider earnings
      description: Retrieve rider earnings for a specific period
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: today
      responses:
        '200':
          description: Earnings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiderEarnings'

  /payments:
    post:
      tags:
        - Payments
      summary: Create payment
      description: Initiate a payment for an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '201':
          description: Payment initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Invalid payment data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payments/{id}/confirm:
    post:
      tags:
        - Payments
      summary: Confirm payment
      description: Confirm payment completion with transaction ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_id:
                  type: string
      responses:
        '200':
          description: Payment confirmed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Invalid transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payments/{id}/refund:
    post:
      tags:
        - Payments
      summary: Process refund
      description: Process a refund for a payment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '200':
          description: Refund processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Refund cannot be processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications:
    get:
      tags:
        - Notifications
      summary: Get user notifications
      description: Retrieve notifications for the authenticated user
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/{id}/read:
    patch:
      tags:
        - Notifications
      summary: Mark notification as read
      description: Mark a specific notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification marked as read
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: Mark all notifications as read
      description: Mark all user notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All notifications marked as read
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        type:
          type: string
          example: validation
        message:
          type: string
          example: Invalid request parameters
        status_code:
          type: integer
          example: 400
        details:
          type: object
          additionalProperties: true

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - first_name
        - last_name
        - user_type
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        user_type:
          type: string
          enum: [customer, restaurant, rider, admin]
        phone:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token_pair:
          $ref: '#/components/schemas/TokenPair'

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        token_type:
          type: string
          example: Bearer

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        phone:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        user_type:
          type: string
        is_active:
          type: boolean
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    Restaurant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        cuisine_type:
          type: string
        address:
          type: string
        city:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        phone:
          type: string
        email:
          type: string
        opening_hours:
          type: string
        price_range:
          type: integer
          minimum: 1
          maximum: 4
        rating:
          type: number
        review_count:
          type: integer
        is_verified:
          type: boolean
        is_active:
          type: boolean
        is_featured:
          type: boolean
        average_delivery_time:
          type: integer
        minimum_order_amount:
          type: number
        delivery_fee:
          type: number
        logo_url:
          type: string
        cover_image_url:
          type: string

    RestaurantCreate:
      type: object
      required:
        - name
        - address
        - city
        - phone
        - cuisine_type
      properties:
        name:
          type: string
        description:
          type: string
        address:
          type: string
        city:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        phone:
          type: string
        email:
          type: string
        opening_hours:
          type: string
        cuisine_type:
          type: string

    RestaurantUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        address:
          type: string
        phone:
          type: string
        opening_hours:
          type: string

    PaginatedRestaurants:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Restaurant'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_number:
          type: string
        user_id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        rider_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, picked_up, on_the_way, delivered, cancelled, refunded]
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        subtotal:
          type: number
        delivery_fee:
          type: number
        tax_amount:
          type: number
        discount_amount:
          type: number
        total_amount:
          type: number
        payment_method:
          type: string
        payment_status:
          type: string
        special_instructions:
          type: string
        estimated_delivery_time:
          type: string
          format: date-time
        actual_delivery_time:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        menu_item_id:
          type: string
          format: uuid
        name:
          type: string
        quantity:
          type: integer
        unit_price:
          type: number
        subtotal:
          type: number

    OrderCreate:
      type: object
      required:
        - restaurant_id
        - delivery_address_id
        - items
      properties:
        restaurant_id:
          type: string
          format: uuid
        delivery_address_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object
            properties:
              menu_item_id:
                type: string
                format: uuid
              quantity:
                type: integer
              unit_price:
                type: number
        special_instructions:
          type: string

    OrderStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, picked_up, on_the_way, delivered, cancelled]
        metadata:
          type: object
          additionalProperties: true

    PaginatedOrders:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    Rider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        vehicle_type:
          type: string
          enum: [bike, scooter, bicycle, walk]
        status:
          type: string
          enum: [offline, available, busy, on_delivery, break]
        current_location:
          $ref: '#/components/schemas/Location'
        rating:
          type: number
        total_deliveries:
          type: integer
        total_earnings:
          type: number

    RiderLocationUpdate:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
        longitude:
          type: number
        bearing:
          type: number
        speed:
          type: number

    RiderEarnings:
      type: object
      properties:
        rider_id:
          type: string
          format: uuid
        period:
          type: string
          enum: [today, week, month]
        total_deliveries:
          type: integer
        total_earnings:
          type: number
        base_earnings:
          type: number
        tip_earnings:
          type: number
        bonus_earnings:
          type: number
        distance_km:
          type: number
        online_hours:
          type: number
        average_per_delivery:
          type: number

    Location:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        bearing:
          type: number
        speed:
          type: number

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        amount:
          type: number
        currency:
          type: string
        method:
          type: string
          enum: [upi, credit_card, debit_card, net_banking, wallet, cod]
        gateway:
          type: string
          enum: [stripe, razorpay, paytm, phonepe]
        status:
          type: string
          enum: [pending, processing, completed, failed, refunded, cancelled]
        transaction_id:
          type: string
        refund_amount:
          type: number
        refund_id:
          type: string
        created_at:
          type: string
          format: date-time

    PaymentCreate:
      type: object
      required:
        - order_id
        - amount
        - method
        - gateway
      properties:
        order_id:
          type: string
          format: uuid
        amount:
          type: number
        currency:
          type: string
          default: INR
        method:
          type: string
          enum: [upi, credit_card, debit_card, net_banking, wallet, cod]
        gateway:
          type: string
          enum: [stripe, razorpay, paytm, phonepe]

    RefundRequest:
      type: object
      required:
        - amount
        - reason
        - refund_type
      properties:
        amount:
          type: number
        reason:
          type: string
        refund_type:
          type: string
          enum: [full, partial]

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
        data:
          type: object
          additionalProperties: true
        priority:
          type: string
          enum: [low, medium, high, urgent]
        read:
          type: boolean
        read_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

version: '3.8'

services:
  # Development Database
  postgres-dev:
    image: postgres:15-alpine
    container_name: cravex-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Raj@76330Raj
      POSTGRES_DB: cravex
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - cravex-dev-network

  # Development Redis
  redis-dev:
    image: redis:7-alpine
    container_name: cravex-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - cravex-dev-network

  # Development Kafka
  zookeeper-dev:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cravex-zookeeper-dev
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cravex-dev-network

  kafka-dev:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cravex-kafka-dev
    depends_on:
      - zookeeper-dev
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-dev:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-dev:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - cravex-dev-network

  # API Service (Development)
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cravex-api-dev
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:Raj@76330Raj@postgres-dev:5432/cravex?sslmode=disable
      REDIS_URL: redis://redis-dev:6379
      KAFKA_BROKERS: kafka-dev:29092
      JWT_SECRET: dev-jwt-secret-key
      DEBUG: "true"
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      - postgres-dev
      - redis-dev
      - kafka-dev
    networks:
      - cravex-dev-network
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres-dev-data:
  redis-dev-data:

networks:
  cravex-dev-network:
    driver: bridge

apiVersion: v1
kind: Secret
metadata:
  name: cravex-secrets
  namespace: cravex
type: Opaque
stringData:
  # Database Credentials
  db.user: "cravex"
  db.password: "cravex_secure_password_2024"
  
  # Redis Credentials
  redis.password: "cravex_secure_password_2024"
  
  # JWT Secret
  jwt.secret: "cravex_jwt_secret_key_2024"
  
  # Payment Gateway Credentials
  stripe.secret.key: "sk_test_your_stripe_secret_key"
  razorpay.key.id: "your_razorpay_key_id"
  razorpay.key.secret: "your_razorpay_key_secret"
  paytm.merchant.key: "your_paytm_merchant_key"
  paytm.merchant.id: "your_paytm_merchant_id"
  
  # Notification Service Credentials
  sendgrid.api.key: "your_sendgrid_api_key"
  twilio.account.sid: "your_twilio_account_sid"
  twilio.auth.token: "your_twilio_auth_token"
  
  # AWS Credentials
  aws.access.key.id: "your_aws_access_key_id"
  aws.secret.access.key: "your_aws_secret_access_key"
  
  # Google Maps API Key
  google.maps.api.key: "your_google_maps_api_key"

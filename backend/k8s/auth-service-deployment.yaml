apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cravex
  labels:
    app: auth-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: v1
    spec:
      containers:
      - name: auth-service
        image: cravex/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: cravex-config
              key: db.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: cravex-config
              key: db.port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: cravex-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cravex-secrets
              key: db.password
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: cravex-config
              key: db.name
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cravex-config
              key: redis.host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: cravex-config
              key: redis.port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cravex-secrets
              key: redis.password
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: cravex-config
              key: kafka.brokers
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: cravex-secrets
              key: jwt.secret
        - name: JWT_ACCESS_TOKEN_DURATION
          value: "15m"
        - name: JWT_REFRESH_TOKEN_DURATION
          value: "720h"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cravex
  labels:
    app: auth-service
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  selector:
    app: auth-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: cravex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

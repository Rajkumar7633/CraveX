openapi: 3.0.3
info:
  title: CraveX REST & Streaming API Suite
  description: Complete API documentation for the CraveX microservice stack (Auth, Restaurant, Order, Rider, Payment).
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Kong API Gateway proxy
  - url: http://localhost:8001
    description: Direct Auth Service
  - url: http://localhost:8002
    description: Direct Restaurant Service
  - url: http://localhost:8003
    description: Direct Order Service
  - url: http://localhost:8004
    description: Direct Rider Service
  - url: http://localhost:8005
    description: Direct Payment Service

paths:
  /auth/login:
    post:
      summary: User Login
      description: Authenticates user credentials and issues JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: securepassword
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request payload

  /auth/otp:
    post:
      summary: Request Phone OTP Login
      description: Verifies OTP for login. Restricted to max 3 requests/hour per number with exponential cooldown checks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneNumber:
                  type: string
                  example: "+919876543210"
                otp:
                  type: string
                  example: "1234"
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '429':
          description: Rate limit exceeded (Max 3/hour or active cooldown)

  /restaurants/search:
    get:
      summary: Search Nearby Restaurants
      description: Searches restaurants by coordinates. Caches results into Redis grid buckets with a 2-minute TTL.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
            example: 28.6139
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
            example: 77.2090
        - name: radiusKm
          in: query
          schema:
            type: number
            format: float
            default: 5.0
            example: 5.0
      responses:
        '200':
          description: List of nearby restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Restaurant'

  /restaurants/{id}/menu:
    get:
      summary: Get Restaurant Menu
      description: Fetches cached menu categories and items with a 5-minute TTL.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Restaurant menu items catalog

  /orders:
    post:
      summary: Create Order Checkout
      description: Executes strict cart validations, GST splits, platform/packing fees, and surge surcharges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/{id}/status:
    put:
      summary: Update Order Status
      description: Advances order status. Enforces unique constraint checks on event_id for idempotency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "preparing"
                notes:
                  type: string
                  example: "Chef commenced prep"
                event_id:
                  type: string
                  example: "evt_transition_001"
      responses:
        '200':
          description: Status successfully updated

  /riders/{id}/track:
    get:
      summary: Live Rider Location Stream (SSE)
      description: Server-Sent Events stream delivering real-time coordinates. Only pushes when location shifts >11m.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stream connection established
          content:
            text/event-stream:
              schema:
                type: string

  /payments/webhook/stripe:
    post:
      summary: Stripe Event Webhook Handler
      description: Secure Stripe webhook verification with HMAC-SHA256 signature checks, timing attack immunity, and replay protection.
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
            example: "t=1726058400,v1=signature_hash"
      responses:
        '200':
          description: Event successfully processed
        '401':
          description: Invalid signature verification failed

components:
  schemas:
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string

    Restaurant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        is_active:
          type: boolean
        is_available:
          type: boolean

    CreateOrderRequest:
      type: object
      properties:
        restaurant_id:
          type: string
        delivery_address_id:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              menu_item_id:
                type: string
              quantity:
                type: integer
              unit_price:
                type: number
        payment_method:
          type: string
        coupon_code:
          type: string

    Order:
      type: object
      properties:
        id:
          type: string
        order_number:
          type: string
        status:
          type: string
        subtotal:
          type: number
        delivery_fee:
          type: number
        tax:
          type: number
        total_amount:
          type: number
